####################
#    Languages     #
####################

[[language]]
name = "css"
formatter = { command = "prettier", args = ["--parser", "css"] }
language-servers = ["vscode-css-language-server", "tailwindcss-language-server"]

[[language]]
name = "c-sharp"
scope = "source.csharp"
roots = ["global.json", "*.csproj", "*.sln"]
file-types = ["cs"]
formatter = { command = "dotnet", args = ["format"] }
language-servers = ["csharp-ls"]

[[language]]
name = "go"
scope = "source.go"
injection-regex = "go"
file-types = ["go"]
roots = ["go.mod"]
auto-format = true
language-servers = ["gopls"]

[[language]]
name = "bash"
scope = "source.bash"
file-types = ["sh", "bash"]
formatter = { command = "shfmt", args = ["-i", "2"] }
auto-format = true

[[language]]
name = "html"
file-types = ["html", "tmpl"]
formatter = { command = "prettier", args = ["--parser", "html"] }
auto-format = false
language-servers = [
  "vscode-html-language-server",
  "tailwindcss-language-server",
]

[[language]]
name = "javascript"
formatter = { command = "prettier", args = ["--parser", "typescript"] }
auto-format = false

[[language]]
name = "json"
formatter = { command = "prettier", args = ["--parser", "json"] }
auto-format = false
language-servers = ["vscode-json-language-server"]

[[language]]
name = "jsx"
formatter = { command = "prettier", args = ["--parser", "typescript"] }
auto-format = false
language-servers = ["typescript-language-server", "tailwindcss-language-server"]

[[language]]
name = "markdown"
formatter = { command = "prettier", args = ["--parser", "markdown"] }
language-servers = ["marksman", "harper"]

[[language]]
name = "sql"
file-types = ["sql"]
formatter = { command = "prettier", args = ["--parser", "sql", "--stdin-filepath", "%{buffer_name}"] }
auto-format = true
indent = { tab-width = 2, unit = "  " }
language-servers = ["postgres-language-server"]

[[language]]
name = "toml"
formatter = { command = "taplo", args = ["fmt", "-"] }
auto-format = true
language-servers = ["taplo"]

[[language]]
name = "typescript"
formatter = { command = "prettier", args = ["--parser", "typescript"] }
auto-format = false
language-servers = ["typescript-language-server", "tailwindcss-language-server"]

[[language]]
name = "tsx"
formatter = { command = "prettier", args = ["--parser", "typescript"] }
auto-format = false
language-servers = ["typescript-language-server", "tailwindcss-language-server"]

[[language]]
name = "xml"
scope = "source.xml"
file-types = ["xml"]
formatter = { command = "prettier", args = ["--parser", "xml"] }
auto-format = true
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "zsh"
scope = "source.zsh"
file-types = ["zsh"]
formatter = { command = "shfmt", args = ["-i", "2"] }
auto-format = true

[[language]]
name = "yaml"
scope = "source.yaml"
injection-regex = "yml|yaml"
file-types = ["yml", "yaml"]
formatter = { command = "prettier", args = ["--parser", "yaml"] }
auto-format = true
comment-token = "#"
indent = { tab-width = 2, unit = "  " }
language-servers = ["yaml-language-server"]

####################
# Language Servers #
####################

[language-server.csharp-ls]
command = "csharp-ls"
timeout = 120

[language-server.gopls]
command = "gopls"

[language-server.gopls.config]
gofumpt = true
local = "goimports"
semanticTokens = true
staticcheck = true
verboseOutput = true
analyses = { "nilness" = true, "unusedparams" = true, "unusedwrite" = true, "useany" = true }
usePlaceholders = true
completeUnimported = true
hints = { "assignVariableType" = true, "compositeLiteralFields" = true, "compositeLiteralTypes" = true, "constantValues" = true, "functionTypeParameters" = true, "parameterNames" = true, "rangeVariableTypes" = true }

[language-server.harper]
command = "harper-ls"
args = ["--stdio"]
config = { harper-ls = { diagnosticSeverity = "error", linters = { long_sentences = false } } }

[language-server.postgres-language-server]
command = "postgres-language-server"
args = ["lsp-proxy"]

[language-server.tailwindcss-language-server]
command = "tailwindcss-language-server"
args = ["--stdio"]

[language-server.taplo]
command = "taplo"
args = ["lsp", "stdio", "--colors", "never"]
environment = { "RUST_LOG" = "taplo=error" }

[language-server.typescript-language-server]
command = "typescript-language-server"
args = ["--stdio"]

[language-server.vscode-css-language-server]
command = "vscode-css-language-server"
args = ["--stdio"]

[language-server.vscode-html-language-server]
command = "vscode-html-language-server"
args = ["--stdio"]

[language-server.vscode-json-language-server]
command = "vscode-json-language-server"
args = ["--stdio"]

[language-server.vscode-markdown-language-server]
command = "vscode-markdown-language-server"
args = ["--stdio"]

[language-server.yaml-language-server]
command = "yaml-language-server"
args = ["--stdio"]
